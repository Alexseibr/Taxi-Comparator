###############################################################################
# nginx-snippet для rwbtaxi.by                                                 #
###############################################################################
#
# Содержит ТРИ блока:
#   1) Server-level security-заголовки (CSP, HSTS, X-Frame-Options и т.д.)
#   2) real_ip — чтобы Node.js видел настоящий IP клиента в X-Real-IP
#   3) location /api/calib/ и /api/wb/ — реверс-прокси к локальным сервисам
#
# Файл — справочник. На VPS лежит в /opt/rwbtaxi-screens/nginx-snippet.conf.
# Реальный nginx-конфиг — /etc/nginx/sites-available/rwbtaxi.by; директивы
# нужно склеить с уже существующим server-блоком, который слушает 443.
#
# После любых правок: `nginx -t && systemctl reload nginx`.

# ─── (1) Security-заголовки. Кладутся НА УРОВНЕ server { ... } ──────────────────
#
# CSP допускает:
#   - 'self' для всего основного,
#   - тайлы OSM и CARTO для подложек карты (кроме них Leaflet ничего не грузит),
#   - data: и blob: для изображений (Leaflet рендерит маркеры в data-URL),
#   - 'unsafe-inline' для style — Leaflet/recharts ставят inline-style на DOM,
#     полностью убрать его без переписывания этих библиотек невозможно,
#   - nominatim.openstreetmap.org для геокодинга поиска по адресу.
# script-src НЕ допускает 'unsafe-inline' — все скрипты идут только из бандла.
#
# HSTS включает домен в HTTPS-only режим на год + автодополнение в подпапки.
# Включай только когда уверен, что http://rwbtaxi.by больше никому не нужен.

add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://nominatim.openstreetmap.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

# ─── (2) real_ip — кладётся НА УРОВНЕ http { ... } ИЛИ server { ... } ──────────
#
# Бэкенд (screen-receiver.mjs / calib) принимает X-Real-IP первым приоритетом,
# поэтому достаточно проставить этот заголовок здесь. set_real_ip_from
# должен указывать на источник запросов nginx — обычно это loopback (127.0.0.1)
# когда nginx и бэк на одной машине; если перед nginx стоит CDN/LB —
# добавить его CIDR-ы тоже.
#
# real_ip_recursive on; — обязательно, если X-Forwarded-For уже приходит
# от вышестоящего прокси с цепочкой "client, proxy1, proxy2".

set_real_ip_from 127.0.0.1;
real_ip_header X-Real-IP;
real_ip_recursive on;

# ─── (3) location-блоки — кладутся ВНУТРИ server { ... } ────────────────────────
#
# ВАЖНО: оба location-блока должны быть ВЫШЕ блока `location / { try_files ... }`,
# иначе SPA-fallback перехватит /api/* и отдаст index.html.

location /api/calib/ {
    # Калибровочный сервис видит /submit, /stats и т.д. без префикса.
    rewrite ^/api/calib/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 64k;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
}

location /api/screens/ {
    # Антифрод-бэк (screen-receiver.mjs) — все эндпоинты /screens/*, /wb/*,
    # /recommended, /upload, /reserve, /release. Бэк сам разбирается с CORS
    # (для /wb/* — strict allowlist по WB_ALLOWED_ORIGIN), nginx только
    # пробрасывает.
    rewrite ^/api/screens/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:3011;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 25m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
}

location /api/wb/ {
    # WB-вкладка — отдельный location, чтобы передавать cookie без
    # перезаписей и при необходимости поднимать особые лимиты.
    rewrite ^/api/wb/(.*)$ /wb/$1 break;
    proxy_pass http://127.0.0.1:3011;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    # Cookie с HttpOnly+Secure прилетит автоматически — nginx по умолчанию
    # не трогает Set-Cookie. credentials:'include' с фронта работает
    # потому что бэк отвечает Access-Control-Allow-Credentials: true и
    # явный Access-Control-Allow-Origin (не "*").
    client_max_body_size 25m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
}
