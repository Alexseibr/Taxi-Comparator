server {
    server_name rwbtaxi.by www.rwbtaxi.by;

    root /var/www/rwbtaxi/dist/public;
    index index.html;

    # ─── security headers (P0-2) ───────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://nominatim.openstreetmap.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # ─── real_ip (P2-5): бэк должен видеть настоящий IP клиента ──────
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Real-IP;
    real_ip_recursive on;

    access_log /var/log/nginx/rwbtaxi.access.log;
    error_log  /var/log/nginx/rwbtaxi.error.log;

    # Basic Auth — без него ничего не отдаём

    # ACME challenge для Let's Encrypt — БЕЗ пароля,
    # иначе certbot не сможет верифицировать домен
    location /.well-known/acme-challenge/ {
        root /var/www/rwbtaxi/dist/public;
        try_files $uri =404;
    }

    # SPA: всё неизвестное — index.html
    # ──── proxy на screen-receiver (для загрузки скринов Yandex Go) ────
    location /api/screens/ {
        # DISABLED 2026-04-29 (по запросу):         limit_req zone=rwbtaxi_screens burst=5 nodelay; 
        # DISABLED 2026-04-29 (по запросу):         limit_req_status 429; 
        rewrite ^/api/screens/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 60m;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ──── proxy на screen-receiver: WB endpoints ────
    location /api/wb/ {
        rewrite ^/api/wb/(.*)$ /wb/$1 break;
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 60m;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }


    # ──── proxy на rwbtaxi-newstat (новый fraud/finance модуль) ────
    location /api/newstat/ {
        rewrite ^/api/newstat/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 30m;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Исходные скриншоты для перепроверки коэффициентов в попапе соты Яндекса.
    # Только белый список: calib-XXX.{png,jpg,jpeg,webp} — никакого path traversal.
    location ~ ^/data/screens/(calib-[a-z0-9-]+\.(png|jpe?g|webp))$ {
        alias /var/www/rwbtaxi/data/screens/processed/$1;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    location /data/ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location ~ /\. {
        deny all;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rwbtaxi.by/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rwbtaxi.by/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = rwbtaxi.by) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name rwbtaxi.by www.rwbtaxi.by;
    return 404; # managed by Certbot


}
