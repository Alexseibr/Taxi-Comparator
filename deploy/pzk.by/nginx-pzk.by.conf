# /etc/nginx/sites-available/pzk.by
#
# Конфиг для статического сайта "Цены на такси Минска" на pzk.by.
# После certbot --nginx сюда будут добавлены SSL-блоки автоматически.

server {
    listen 80;
    listen [::]:80;
    server_name pzk.by www.pzk.by;

    # certbot будет писать сюда challenge-файлы
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Всё остальное — редирект на https (раскомментировать после получения SSL)
    # return 301 https://$host$request_uri;

    # До получения SSL временно отдаём сайт по http:
    root /var/www/pzk.by;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

